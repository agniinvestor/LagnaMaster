[pytest]
markers =
    phase1: Phase 1 tests (positions, nakshatra, panchangam)
    phase2: Phase 2 tests (dignity, house lords, aspects)
    phase3: Phase 3 tests (AV, yogas, dashas, shadbala, vargas)
    smoke: Golden 50 subset for CI smoke tests
filterwarnings =
    error::ResourceWarning
    error::DeprecationWarning
    ignore::jwt.warnings.InsecureKeyLengthWarning
