{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lagnamaster-ingress
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  rules:
    - host: {{ .Values.ingress.hosts.api.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.api.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.api.name }}
                port:
                  number: {{ .Values.api.port }}
    - host: {{ .Values.ingress.hosts.ui.host }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.ui.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ui.name }}
                port:
                  number: {{ .Values.ui.port }}
{{- end }}
