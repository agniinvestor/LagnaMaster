apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ui.name }}
  labels:
    {{- include "lagnamaster.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.replicaCount.ui }}
  selector:
    matchLabels:
      app: {{ .Values.ui.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.ui.name }}
    spec:
      containers:
        - name: ui
          image: {{ .Values.image.registry }}/{{ .Values.image.owner }}/lagnamaster-ui:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ui.port }}
          env:
            {{- include "lagnamaster.secretEnv" . | nindent 12 }}
            {{- include "lagnamaster.commonEnv" . | nindent 12 }}
            - name: API_URL
              value: "http://{{ .Values.api.name }}:{{ .Values.api.port }}"
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
